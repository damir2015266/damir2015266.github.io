<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="robots" content="noindex">
    <style>
        body {
            font-family: Segoe UI, Tahoma;
            background: #191919;
            color: white;
            margin: 0;
            padding: 30px;
        }
        .login-box {
            width: 320px;
            margin: 100px auto;
            background: #232323;
            padding: 40px;
            border-radius: 12px;
        }
        input {
            width: 100%;
            padding: 14px;
            margin: 8px 0;
            background: #2d2d2d;
            border: 1px solid #3d3d3d;
            border-radius: 8px;
            color: white;
        }
        button {
            width: 100%;
            padding: 14px;
            margin-top: 15px;
            background: #00b06f;
            border: none;
            border-radius: 8px;
            color: white;
            font-weight: 600;
            cursor: pointer;
        }
        button:hover {
            background: #00c079;
        }
    </style>
</head>
<body>
    <div class="login-box">
        <h2>🔐 Вход в аккаунт</h2>
        <input id="username" placeholder="Никнейм">
        <input id="password" type="password" placeholder="Пароль">
        <button onclick="login()">✅ ВОЙТИ</button>
        <div id="status" style="margin-top: 20px; text-align: center"></div>
    </div>

    <script>
        const FIREBASE = "https://projectblox-ed2c8-default-rtdb.firebaseio.com/";

        async function login() {
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            
            const res = await fetch(FIREBASE + `users/${username}.json`);
            const user = await res.json();
            
            if(user && user.password === password) {
                document.getElementById('status').innerHTML = '✅ Авторизация успешна!';
                
                // Сообщаем студии что пользователь авторизован
                window.external.ExecuteLua(`
                    game:SetAttribute("LoggedInUser", "${username}")
                    game:SetAttribute("UserToken", "${user.id}")
                    print("✅ Пользователь ${username} авторизован")
                `);
                
                setTimeout(() => window.location.href = '/roblox-games-website.html', 1000);
            } else {
                document.getElementById('status').innerHTML = '❌ Неверный логин или пароль';
            }
        }
    </script>
</body>
</html>
