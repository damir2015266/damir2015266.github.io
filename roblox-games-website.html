<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roblox Games Launcher
    </title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #0f172a 100%);
            min-height: 100vh;
            color: white;
        }

        .header {
            padding: 30px;
            text-align: center;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            background: rgba(0,0,0,0.2);
        }

        .header h1 {
            font-size: 42px;
            font-weight: 700;
            background: linear-gradient(90deg, #e11d48, #f97316);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 30px;
        }

        .games-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 25px;
            margin-top: 20px;
        }

        .game-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 25px;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .game-card:hover {
            transform: translateY(-5px);
            border-color: #e11d48;
            box-shadow: 0 20px 40px rgba(225, 29, 72, 0.2);
        }

        .game-name {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 10px;
        }

        .game-author {
            color: #94a3b8;
            font-size: 14px;
            margin-bottom: 15px;
        }

        .play-button {
            width: 100%;
            background: linear-gradient(135deg, #22c55e 0%, #16a34a 100%);
            color: white;
            border: none;
            padding: 12px;
            font-size: 16px;
            font-weight: 700;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .play-button:hover {
            transform: scale(1.03);
        }

        .status {
            text-align: center;
            padding: 50px;
            color: #64748b;
        }

        .loading {
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>🎮 Roblox Games Library</h1>
        <p>Все игры опубликованные из Roblox Studio в Firebase</p>
    </div>

    <div class="container">
        <div id="games-container" class="games-grid">
            <div class="status loading">⏳ Загрузка списка игр с Firebase...</div>
        </div>
    </div>

    <script type="module">
        // Подключение к вашей базе Firebase
        const FIREBASE_URL = "https://projectblox-ed2c8-default-rtdb.firebaseio.com/games.json";

        async function loadGames() {
            try {
                const response = await fetch(FIREBASE_URL);
                const games = await response.json();
                
                const container = document.getElementById('games-container');
                container.innerHTML = '';

                if (!games || Object.keys(games).length === 0) {
                    container.innerHTML = '<div class="status">📭 Пока нет опубликованных игр. Опубликуйте первую игру из Roblox Studio!</div>';
                    return;
                }

                Object.entries(games).forEach(([id, game]) => {
                    const card = document.createElement('div');
                    card.className = 'game-card';
                    card.innerHTML = `
                        <div class="game-name">${game.name || 'Без названия'}</div>
                        <div class="game-author">👤 ${game.author || 'Неизвестный автор'}</div>
                        <div style="color: #64748b; font-size: 12px; margin-bottom: 15px;">
                            📅 ${new Date(game.created * 1000).toLocaleDateString('ru-RU')}
                        </div>
                        <button class="play-button" onclick="launchGame('${id}')">▶ Играть</button>
                    `;
                    container.appendChild(card);
                });

            } catch (error) {
                document.getElementById('games-container').innerHTML = `<div class="status">❌ Ошибка загрузки игр: ${error.message}</div>`;
            }
        }

        window.launchGame = function(gameId) {
            // Запускаем ваш клиент с этой игрой
            const shell = new ActiveXObject("WScript.Shell");
            shell.Run(`"${window.location.pathname.replace(/\/[^\/]+$/, '/').substring(1)}RobloxBeta.exe ${gameId}`);
            alert('✅ Игра запускается!');
        }

        loadGames();
        setInterval(loadGames, 30000); // Автоматическое обновление каждые 30 секунд
    </script>
</body>
</html>
